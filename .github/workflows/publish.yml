name: Publish to PyPI

# Pushing a v* tag builds and publishes to PyPI (Trusted Publishing / OIDC, no token needed)
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing
      contents: read    # private-repo checkout (a permissions block must list every needed scope)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - run: uv publish   # OIDC trusted publishing — upload without an API token
